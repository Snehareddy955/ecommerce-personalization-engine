<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ecommerce Personalization Engine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-primary text-white">

            <h2 class="text-center">

                🛍 Ecommerce Personalization Rules Engine

            </h2>

        </div>

        <div class="card-body">

            <h4>🎮 Event Simulator</h4>

            <div class="mb-3">

                <button class="btn btn-secondary btn-sm m-1" onclick="addEvent('home')">Home</button>

                <button class="btn btn-secondary btn-sm m-1" onclick="addEvent('category')">Category</button>

                <button class="btn btn-secondary btn-sm m-1" onclick="addEvent('product')">Product</button>

                <button class="btn btn-secondary btn-sm m-1" onclick="addEvent('compare')">Compare</button>

                <button class="btn btn-secondary btn-sm m-1" onclick="addEvent('coupon')">Coupon</button>

                <button class="btn btn-secondary btn-sm m-1" onclick="addEvent('cart')">Cart</button>

                <button class="btn btn-secondary btn-sm m-1" onclick="addEvent('purchase')">Purchase</button>

                <button class="btn btn-secondary btn-sm m-1" onclick="addEvent('exit')">Exit</button>

                <button class="btn btn-danger btn-sm m-1" onclick="clearEvents()">Clear</button>

            </div>

            <label class="form-label fw-bold">

                Paste User Events

            </label>

            <textarea
                id="events"
                class="form-control"
                rows="8"
                placeholder="home&#10;category&#10;product&#10;cart&#10;exit"></textarea>

            <button
                class="btn btn-primary w-100 mt-3"
                onclick="analyzeEvents()">

                🔍 Analyze

            </button>
            <button

class="btn btn-success mt-3 w-100"

onclick="downloadReport()">

Download Report

</button>

            <hr>

            <h3>

📊 Results

</h3>

            <p>

                <strong>Shopper State:</strong>

                <span id="state" class="badge bg-secondary">

                    -

                </span>

            </p>

            <p>

                <strong>Confidence:</strong>

            </p>

            <div class="progress">

                <div
                    id="confidenceBar"
                    class="progress-bar"
                    style="width:0%;">

                    0%

                </div>

            </div>

            <br>

            <p>

                <strong>Evidence:</strong>

            </p>

            <div
                id="evidence"
                class="alert alert-info">

                -

            </div>

            <p>

                <strong> 💡Recommendation:</strong>

            </p>

            <div
                id="recommendation"
                class="alert alert-success">

                -

            </div>

            <p>

<strong>🤖 AI Recommendation:</strong>

</p>

<div
id="ai_response"
class="alert alert-warning">

-

</div>

<hr>

<h3>Recent Sessions</h3>

<ul id="history"></ul>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
